<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JAAR — The Future Needs You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --red:    #e8251a;
      --orange: #f07010;
      --yellow: #f5c800;
      --green:  #2a9a2a;
      --blue:   #1a50c8;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HERO ── */
    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px 0;
    }

    .logo-wrap {
      width: min(860px, 92vw);
    }

    .logo-svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    /* Rainbow stripe */
    .stripe {
      width: 100%;
      display: flex;
      flex-direction: column;
      margin-top: 10px;
    }

    .stripe span {
      width: 100%;
      height: 6px;
    }

    .tagline {
      margin-top: 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.65rem, 2vw, 0.85rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.75;
    }

    /* ── SECTION ── */
    .section {
      width: 100%;
      max-width: 1000px;
      padding: 72px 32px 48px;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2px;
    }

    .card {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 28px 24px;
      text-decoration: none;
      color: var(--white);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background 0.12s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--yellow), var(--green), var(--blue));
      opacity: 0;
      transition: opacity 0.12s;
    }

    .card:hover { background: #141414; }
    .card:hover::before { opacity: 1; }

    .card-num {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.25);
    }

    .card-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.05rem;
      letter-spacing: 0.05em;
      line-height: 1.2;
      color: var(--white);
    }

    .card-desc {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
    }

    .card-tag {
      margin-top: auto;
      padding-top: 14px;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }

    /* ── FOOTER ── */
    footer {
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 20px 32px;
      display: flex;
      justify-content: center;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }

    @media (max-width: 480px) {
      .section { padding: 48px 20px 32px; }
      .stripe { height: 12px; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo-wrap">
      <img class="logo-svg" src="jaar_logo_tight.svg" alt="JAAR" />
    </div>
    <div class="stripe">
      <span style="background:var(--red)"></span>
      <span style="background:var(--orange)"></span>
      <span style="background:var(--yellow)"></span>
      <span style="background:var(--green)"></span>
      <span style="background:var(--blue)"></span>
    </div>
    <p class="tagline">The Future Needs You</p>
  </div>

  <section class="section">
    <div class="section-label">Ferramentas</div>

    <div class="grid">

      <a class="card" href="tools/bokeh-generator.html">
        <div class="card-num">001</div>
        <div class="card-title">Bokeh<br>Abstrato</div>
        <div class="card-desc">Gerador de imagens abstratas com manchas de luz coloridas, desfoque suave e múltiplas paletas.</div>
        <div class="card-tag">Visual · Gerador</div>
      </a>

    </div>
  </section>

  <footer>jaar &nbsp;·&nbsp; feito com claude code</footer>

</body>
</html>
