<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jaar — ferramentas</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07070d;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --muted: rgba(232,232,240,0.4);
      --accent: #7c5cfc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 48px 48px 0;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    main {
      flex: 1;
      padding: 64px 48px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .heading {
      margin-bottom: 8px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .subheading {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      cursor: pointer;
    }

    .card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-tag {
      margin-top: auto;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    footer {
      padding: 24px 48px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      header, main, footer { padding-left: 20px; padding-right: 20px; }
      main { padding-top: 40px; }
      .heading { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/">jaar<span>.</span></a>
  </header>

  <main>
    <h1 class="heading">Ferramentas</h1>
    <p class="subheading">Coleção de utilitários e geradores visuais.</p>

    <div class="grid">

      <a class="card" href="tools/bokeh-generator.html">
        <div class="card-icon" style="background: rgba(124,92,252,0.15);">🎨</div>
        <div class="card-title">Gerador de Bokeh Abstrato</div>
        <div class="card-desc">Gera imagens abstratas com manchas de luz coloridas e desfoque suave. Várias paletas de cores e download em PNG.</div>
        <div class="card-tag">Visual · Gerador</div>
      </a>

    </div>
  </main>

  <footer>jaar — feito com Claude Code</footer>

</body>
</html>
